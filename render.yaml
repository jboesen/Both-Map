services:
  - type: web
    name: both-map
    runtime: docker
    plan: free
    envVars:
      # LLM Configuration (MiniMax with Anthropic-compatible API)
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_BASE_URL
        sync: false
      - key: MINIMAX_MODEL
        sync: false
      # Database (required)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Research (required for topic research and web search)
      - key: EXA_API_KEY
        sync: false
      # Optional features
      - key: CRON_SCHEDULE_HOURS
        value: "24"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: "21m00Tcm4TlvDq8ikWAM"
      - key: ELEVENLABS_MODEL_ID
        value: "eleven_turbo_v2_5"
      - key: PORT
        value: "8000"
